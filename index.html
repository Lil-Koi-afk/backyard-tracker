async function cloudSave(data) {
  try {
    const res = await fetch(FIREBASE_URL + DB_PATH, { method: "PUT", headers: { "Content-Type": "application/json" }, body: JSON.stringify(data) });
    return res.ok;
  } catch { return false; }
}
async function cloudLoad() {
  try {
    const res = await fetch(FIREBASE_URL + DB_PATH);
    if (!res.ok) return null;
    return (await res.json()) || {};
  } catch { return null; }
}

function LoginScreen({ onLogin }) {
  const [pin, setPin] = useState("");
  const [error, setError] = useState(false);
  const [shaking, setShaking] = useState(false);

  function handleKey(n) {
    if (n === "del") { setPin(p => p.slice(0, -1)); return; }
    if (pin.length >= 4) return;
    const next = pin + n;
    setPin(next);
    if (next.length === 4) {
      setTimeout(() => {
        if (next === PASSWORD) { localStorage.setItem("byu-auth", "true"); onLogin(); }
        else { setError(true); setShaking(true); setPin(""); setTimeout(() => { setShaking(false); setError(false); }, 600); }
      }, 150);
    }
  }

  const keys = [1,2,3,4,5,6,7,8,9,null,0,"del"];

  return (
    <div style={{ minHeight:"100vh", background:"linear-gradient(135deg,#0a0a0a 0%,#1a1a2e 50%,#0a0a0a 100%)", display:"flex", alignItems:"center", justifyContent:"center", padding:20 }}>
      <div className={shaking ? "shake" : ""} style={{ textAlign:"center" }}>
        <div style={{ fontSize:64, marginBottom:8 }}>🐺</div>
        <h1 style={{ fontFamily:"Georgia,serif", fontSize:22, letterSpacing:"0.15em", color:"#fff", marginBottom:4 }}>BACKYARD ULTRA</h1>
        <p style={{ color:"#666", fontSize:12, letterSpacing:"0.2em", marginBottom:32 }}>24H TRAINING TRACKER</p>

        <div style={{ display:"flex", gap:12, justifyContent:"center", marginBottom:28 }}>
          {[0,1,2,3].map(i => (
            <div key={i} style={{
              width:16, height:16, borderRadius:"50%", border:"2px solid",
              borderColor: error ? "#ef4444" : i < pin.length ? "#f97316" : "#444",
              background: i < pin.length ? "#f97316" : "transparent",
              transition: "all 0.2s"
            }} />
          ))}
        </div>

        <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:12, maxWidth:240, margin:"0 auto" }}>
          {keys.map((n, i) => n === null ? <div key={i}/> : (
            <button key={i} onClick={() => handleKey(n)}
              style={{ width:64, height:64, borderRadius:16, background:"rgba(255,255,255,0.05)", border:"1px solid rgba(255,255,255,0.08)", color:"#fff", fontSize:20, fontWeight:500, display:"flex", alignItems:"center", justifyContent:"center" }}>
              {n === "del" ? "⌫" : n}
            </button>
          ))}
        </div>
        {error && <p style={{ color:"#ef4444", fontSize:13, marginTop:16 }}>Falscher Code</p>}
      </div>
    </div>
  );
}

function ProgressRing({ progress, size = 90, stroke = 6 }) {
  const r = (size - stroke) / 2;
  const circ = 2 * Math.PI * r;
  const offset = circ - (progress / 100) * circ;
  return (
    <svg width={size} height={size} style={{ transform:"rotate(-90deg)" }}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth={stroke}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="url(#pgrad)" strokeWidth={stroke}
        strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
        style={{ transition:"stroke-dashoffset 1s ease" }}/>
      <defs>
        <linearGradient id="pgrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stopColor="#f97316"/>
          <stop offset="100%" stopColor="#ef4444"/>
        </linearGradient>
      </defs>
    </svg>
  );
}

function DayCard({ day, checked, onToggle, isToday, expanded, onExpand }) {
  const s = TYPE_STYLES[day.type] || TYPE_STYLES.run;
  const d = new Date(day.date + "T00:00:00");
  const dayNum = d.getDate();
  const monthShort = d.toLocaleDateString("de-DE", { month:"short" });
  const today = getToday();
  const isPast = day.date < today && !checked;

  return (
    <div className="card" onClick={onExpand}
      style={{
        borderRadius:16, border: s.border, background: s.bg, overflow:"hidden",
        boxShadow: isToday ? "0 0 0 2px rgba(249,115,22,0.4)" : "none",
        opacity: checked ? 0.55 : 1, marginBottom:10
      }}>
      <div style={{ padding:16, display:"flex", alignItems:"flex-start", gap:16 }}>
        {/* Date */}
        <div style={{ textAlign:"center", flexShrink:0, minWidth:48 }}>
          <div style={{ fontSize:26, fontWeight:700, color: isToday ? "#f97316" : "#fff" }}>{dayNum}</div>
          <div style={{ fontSize:11, color:"#777", textTransform:"uppercase" }}>{monthShort}</div>
          {isToday && <div style={{ fontSize:10, color:"#f97316", fontWeight:700, marginTop:4, letterSpacing:"0.1em" }}>HEUTE</div>}
        </div>

        {/* Content */}
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:4, flexWrap:"wrap" }}>
            <span style={{ fontSize:11, fontWeight:700, letterSpacing:"0.08em", color: s.text }}>{s.label}</span>
            {day.zone !== "–" && <span style={{ color:"#555", fontSize:11 }}>·</span>}
            {day.zone !== "–" && <span style={{ color:"#999", fontSize:11 }}>{day.zone}</span>}
            {isPast && <span style={{ color:"rgba(239,68,68,0.5)", fontSize:11, marginLeft:"auto" }}>verpasst?</span>}
          </div>
          <h3 style={{ fontWeight:700, fontSize:17, color: checked ? "#666" : "#fff", textDecoration: checked ? "line-through" : "none", margin:0 }}>{day.unit}</h3>
          <div style={{ display:"flex", alignItems:"center", gap:10, marginTop:6, flexWrap:"wrap" }}>
            {day.dauer !== "–" && <span style={{ color:"#bbb", fontSize:13 }}>{day.dauer}</span>}
            <span style={{ color:"#666", fontSize:13 }}>{day.fokus}</span>
          </div>
        </div>

        {/* Checkbox */}
        <button onClick={e => { e.stopPropagation(); onToggle(); }}
          style={{
            width:42, height:42, borderRadius:12, flexShrink:0,
            border: checked ? "2px solid #f97316" : "2px solid #555",
            background: checked ? "#f97316" : "transparent",
            display:"flex", alignItems:"center", justifyContent:"center",
            color:"#fff", fontSize:18, fontWeight:700, transition:"all 0.2s"
          }}>
          {checked ? "✓" : ""}
        </button>
      </div>

      {expanded && (
        <div style={{ padding:"0 16px 16px", borderTop:"1px solid rgba(255,255,255,0.05)", marginTop:-2, paddingTop:14 }}>
          <p style={{ color:"#ccc", fontSize:14, lineHeight:1.6 }}>{day.detail}</p>
        </div>
      )}
    </div>
  );
}

function App() {
  const [authed, setAuthed] = useState(localStorage.getItem("byu-auth") === "true");
  const [checkedDays, setCheckedDays] = useState({});
  const [expandedDay, setExpandedDay] = useState(null);
  const [activeWeek, setActiveWeek] = useState(null);
  const [syncStatus, setSyncStatus] = useState("loading");
  const saveTimeout = useRef(null);

  const today = getToday();

  // Initial load: cloud first, local fallback
  useEffect(() => {
    (async () => {
      const cloud = await cloudLoad();
      if (cloud !== null) {
        setCheckedDays(cloud);
        localStorage.setItem("byu-checked", JSON.stringify(cloud));
        setSyncStatus("online");
      } else {
        const local = JSON.parse(localStorage.getItem("byu-checked") || "{}");
        setCheckedDays(local);
        setSyncStatus("offline");
      }
      const cw = PLAN.find(w => w.days.some(d => d.date === today))?.week
        || PLAN.find(w => w.days.some(d => d.date >= today))?.week
        || PLAN[PLAN.length - 1].week;
      setActiveWeek(cw);
    })();
  }, []);

  // Auto-refresh from cloud every 30s
  useEffect(() => {
    const interval = setInterval(async () => {
      const cloud = await cloudLoad();
      if (cloud) { setCheckedDays(cloud); localStorage.setItem("byu-checked", JSON.stringify(cloud)); setSyncStatus("online"); }
    }, 30000);
    return () => clearInterval(interval);
  }, []);

  function toggleDay(date) {
    const next = { ...checkedDays };
    next[date] = !next[date];
    if (!next[date]) delete next[date];
    setCheckedDays(next);
    localStorage.setItem("byu-checked", JSON.stringify(next));
    // Debounced cloud save
    setSyncStatus("syncing");
    if (saveTimeout.current) clearTimeout(saveTimeout.current);
    saveTimeout.current = setTimeout(async () => {
      const ok = await cloudSave(next);
      setSyncStatus(ok ? "online" : "offline");
    }, 500);
  }

  if (!authed) return <LoginScreen onLogin={() => setAuthed(true)} />;

  const totalTraining = TRAINING_DAYS.length;
  const checkedCount = TRAINING_DAYS.filter(d => checkedDays[d.date]).length;
  const progress = Math.round((checkedCount / totalTraining) * 100);
  const todayEntry = ALL_DAYS.find(d => d.date === today);
  const upcoming = ALL_DAYS.filter(d => d.date > today).slice(0, 3);
  const raceDate = new Date("2026-03-21T00:00:00");
  const todayDate = new Date(today + "T00:00:00");
  const daysUntilRace = Math.max(0, Math.ceil((raceDate - todayDate) / (1000*60*60*24)));

  return (
    <div style={{ minHeight:"100vh", background:"linear-gradient(180deg,#0a0a0a 0%,#111118 100%)", paddingBottom:80 }}>

      {/* Header */}
      <div style={{ background:"linear-gradient(135deg,rgba(249,115,22,0.12) 0%,rgba(239,68,68,0.06) 100%)", borderBottom:"1px solid rgba(255,255,255,0.05)" }}>
        <div style={{ maxWidth:640, margin:"0 auto", padding:24 }}>
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:24 }}>
            <div>
              <h1 style={{ fontSize:24, fontWeight:700, fontFamily:"Georgia,serif", margin:0 }}>BACKYARD ULTRA <span className={`sync-dot ${syncStatus}`} title={syncStatus==="online"?"Cloud sync aktiv":syncStatus==="syncing"?"Synchronisiert...":"Offline"}/></h1>
              <p style={{ color:"#777", fontSize:13, margin:"4px 0 0" }}>Lone Wolf SE · 21. März 2026</p>
            </div>
            <div style={{ textAlign:"right" }}>
              <div style={{ fontSize:32, fontWeight:700, color:"#f97316" }}>{daysUntilRace}</div>
              <div style={{ color:"#777", fontSize:10, letterSpacing:"0.15em" }}>TAGE BIS RACE</div>
            </div>
          </div>

          <div style={{ display:"flex", alignItems:"center", gap:24 }}>
            <div style={{ position:"relative", flexShrink:0 }}>
              <ProgressRing progress={progress} />
              <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"center" }}>
                <span style={{ fontSize:20, fontWeight:700 }}>{progress}%</span>
              </div>
            </div>
            <div style={{ flex:1 }}>
              <div style={{ display:"flex", justifyContent:"space-between", fontSize:13, marginBottom:8 }}>
                <span style={{ color:"#999" }}>Training</span>
                <span style={{ color:"#666" }}>{checkedCount}/{totalTraining}</span>
              </div>
              <div style={{ height:8, background:"rgba(255,255,255,0.05)", borderRadius:4, overflow:"hidden" }}>
                <div style={{ height:"100%", borderRadius:4, background:"linear-gradient(90deg,#f97316,#ef4444)", width:`${progress}%`, transition:"width 1s ease" }}/>
              </div>
              <div style={{ display:"flex", gap:14, marginTop:12, flexWrap:"wrap" }}>
                {Object.entries(TYPE_STYLES).map(([k,v]) => (
                  <div key={k} style={{ display:"flex", alignItems:"center", gap:5 }}>
                    <div style={{ width:7, height:7, borderRadius:"50%", background:v.dot }}/>
                    <span style={{ color:"#666", fontSize:10 }}>{v.label}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      </div>

      <div style={{ maxWidth:640, margin:"0 auto", padding:"0 20px" }}>

        {/* Today */}
        {todayEntry && (
          <div style={{ paddingTop:24 }}>
            <h2 style={{ fontSize:11, fontWeight:700, color:"#f97316", letterSpacing:"0.15em", marginBottom:12 }}>
              HEUTE — {new Date(today+"T00:00:00").toLocaleDateString("de-DE",{weekday:"long",day:"numeric",month:"long"})}
            </h2>
            <DayCard day={todayEntry} checked={!!checkedDays[todayEntry.date]} onToggle={() => toggleDay(todayEntry.date)}
              isToday={true} expanded={expandedDay===todayEntry.date} onExpand={() => setExpandedDay(expandedDay===todayEntry.date?null:todayEntry.date)} />
          </div>
        )}

        {/* Upcoming */}
        {upcoming.length > 0 && (
          <div style={{ paddingTop:24 }}>
            <h2 style={{ fontSize:11, fontWeight:700, color:"#666", letterSpacing:"0.15em", marginBottom:12 }}>NÄCHSTE EINHEITEN</h2>
            {upcoming.map(d => (
              <DayCard key={d.date} day={d} checked={!!checkedDays[d.date]} onToggle={() => toggleDay(d.date)}
                isToday={false} expanded={expandedDay===d.date} onExpand={() => setExpandedDay(expandedDay===d.date?null:d.date)} />
            ))}
          </div>
        )}

        {/* Weeks Nav */}
        <div style={{ paddingTop:32 }}>
          <h2 style={{ fontSize:11, fontWeight:700, color:"#666", letterSpacing:"0.15em", marginBottom:12 }}>WOCHEN</h2>
          <div style={{ display:"flex", gap:8, overflowX:"auto", paddingBottom:8 }}>
            {PLAN.map(w => {
              const wc = w.days.filter(d => checkedDays[d.date]).length;
              const isActive = activeWeek === w.week;
              const isCurrent = w.days.some(d => d.date === today);
              return (
                <button key={w.week} onClick={() => setActiveWeek(w.week)}
                  style={{
                    flexShrink:0, padding:"10px 16px", borderRadius:12,
                    border: isActive ? "1px solid rgba(249,115,22,0.4)" : "1px solid rgba(255,255,255,0.05)",
                    background: isActive ? "rgba(249,115,22,0.12)" : "rgba(255,255,255,0.02)",
                    color: isActive ? "#f97316" : "#888", textAlign:"center"
                  }}>
                  <div style={{ fontSize:12, fontWeight:700 }}>W{w.week}</div>
                  <div style={{ fontSize:10, opacity:0.6, marginTop:2 }}>{wc}/{w.days.length}</div>
                  {isCurrent && <div style={{ width:6, height:6, borderRadius:"50%", background:"#f97316", margin:"4px auto 0" }}/>}
                </button>
              );
            })}
          </div>
        </div>

        {/* Active Week */}
        {activeWeek && (() => {
          const w = PLAN.find(w => w.week === activeWeek);
          if (!w) return null;
          return (
            <div style={{ paddingTop:16 }}>
              <h3 style={{ fontSize:18, fontWeight:700, margin:0 }}>
                Woche {w.week} <span style={{ color:"#666", fontWeight:400, fontSize:14 }}>· {w.dateRange}</span>
              </h3>
              <p style={{ color:"rgba(249,115,22,0.7)", fontSize:13, marginTop:4, marginBottom:16 }}>{w.goal}</p>
              {w.days.map(d => (
                <DayCard key={d.date} day={d} checked={!!checkedDays[d.date]} onToggle={() => toggleDay(d.date)}
                  isToday={d.date===today} expanded={expandedDay===d.date}
                  onExpand={() => setExpandedDay(expandedDay===d.date?null:d.date)} />
              ))}
            </div>
          );
        })()}

        {/* Race Day Link */}
        <div style={{ textAlign:"center", paddingTop:40, paddingBottom:20 }}>
          <a href="race.html" style={{
            display:"inline-flex", alignItems:"center", gap:10, padding:"16px 32px",
            borderRadius:16, background:"linear-gradient(135deg,rgba(239,68,68,.12),rgba(249,115,22,.08))",
            border:"1px solid rgba(239,68,68,.25)", color:"#f87171", textDecoration:"none",
            fontSize:15, fontWeight:700, letterSpacing:".05em"
          }}>
            🐺 RACE DAY TRACKER →
          </a>
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
